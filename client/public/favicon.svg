<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <clipPath id="hull"><circle cx="16" cy="16" r="13"/></clipPath>
  </defs>
  <g clip-path="url(#hull)">
    <!-- water: filled up to the wavy waterline -->
    <path d="M3 16 q6.5 -4 13 0 t13 0 V30 H3 Z" fill="#22d3ee" fill-opacity="0.28"/>
    <!-- ballast keel -->
    <path d="M11 12 l5 9 5 -9 Z" fill="#34d399"/>
    <!-- waterline wave -->
    <path d="M3 16 q6.5 -4 13 0 t13 0" stroke="#22d3ee" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  <!-- hull ring -->
  <circle cx="16" cy="16" r="13" stroke="#143040" stroke-width="2" fill="none"/>
</svg>
